name: beijing_stories
description: 北京故事 - 扫码了解北京背后的故事
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 二维码扫描
  mobile_scanner: ^4.0.1

  # 深度链接
  uni_links: ^0.5.1

  # 网络请求
  http: ^1.1.0

  # 状态管理
  provider: ^6.1.1

  # 本地存储
  shared_preferences: ^2.2.2

  # 路由
  go_router: ^13.0.0

  # UI组件
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9

  # 工具
  intl: ^0.18.1
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
